name: Build Ultra Fast APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Re-create Missing Android Native Files
        run: flutter create . --platforms=android

      - name: Inject Internet Permission into Android Manifest
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' android/app/src/main/AndroidManifest.xml

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Compile Ultra-Optimized Release APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Upload Finished APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: exchange-fastest-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

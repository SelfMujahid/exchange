name: Generate Native Crypto Pro APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Code fetch karna
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Java environment setup karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Server par globally installed gradle ka use karke build karna (No gradlew needed)
    - name: Install and Build with Gradle Global
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle
        gradle assembleDebug

    # 4. APK download ke liye upload karna
    - name: Upload Generated APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CryptoNativePro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

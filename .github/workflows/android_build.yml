name: Generate Native Crypto Pro APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub se aapka code download karna
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Java Environment Environment ready karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. System level par Gradle configure karna aur project dhoond kar build karna
    - name: Smart Search and Build Android Project
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle
        
        # Yeh command khud search karegi ke aapka main project kis folder mein hai
        TARGET_DIR=$(dirname $(find . -name "build.gradle*" | head -n 1))
        
        if [ -z "$TARGET_DIR" ] || [ "$TARGET_DIR" = "." ]; then
          echo "Building from root folder..."
          gradle assembleDebug --warning-mode all
        else
          echo "Found Android project inside folder: $TARGET_DIR"
          cd "$TARGET_DIR"
          gradle assembleDebug --warning-mode all
        fi

    # 4. APK download ke liye target pipeline par transfer karna
    - name: Upload Generated APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CryptoNativePro-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"

name: Generate Native Crypto Pro APK

# Yeh build tab chalega jab aap code push karenge ya manually mobile se trigger karenge
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub aapke 'exchange' repository ka code fetch karega
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Server par Java (JDK 17) environment set up hoga
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Android build tool (Gradle wrapper) ko execution permission di jayegi
    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # 4. Pure Android code ko compile karke Debug APK banayi jayegi
    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    # 5. APK banne ke baad, use download karne ke liye upload kiya jayega
    - name: Upload Generated APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CryptoNativePro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
